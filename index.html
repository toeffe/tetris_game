<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STONEFALL</title>
<link rel="stylesheet" href="./styles.css">
</head>
<body>
  <h1 class="title">STONEFALL</h1>
  <p class="subtitle">Tetris battle</p>

  <div id="menu" class="panel">
    <label class="field-label" for="menuName">Your name</label>
    <input id="menuName" class="name-input" type="text" maxlength="12" autocomplete="nickname" spellcheck="false" placeholder="Name">
    <button id="btnLocal">Same device (1v1)</button>
    <button id="btnHost" class="secondary">Remote — Host</button>
    <button id="btnJoin" class="secondary">Remote — Join</button>
    <p class="hint">Same device always works. Remote: up to 8 players, ready-up lobby, 5-character code.</p>
  </div>

  <div id="netPanel" class="panel" hidden>
    <p id="netLabel" class="hint"></p>
    <div id="roomCode" class="room-code" hidden>·····</div>
    <button id="btnCopy" type="button" hidden>Copy code</button>
    <input id="netIn" type="text" maxlength="5" autocomplete="off" spellcheck="false" placeholder="Code" hidden>
    <button id="btnNetGo" type="button" hidden>Join</button>
    <p id="netStatus" class="hint"></p>
    <button id="btnNetBack" class="secondary" type="button">Back</button>
  </div>

  <div id="lobby" class="panel" hidden>
    <p class="hint">Room code</p>
    <div id="lobbyCode" class="room-code">·····</div>
    <button id="btnCopyLobby" type="button">Copy code</button>
    <label class="field-label" for="lobbyName">Your name</label>
    <input id="lobbyName" class="name-input" type="text" maxlength="12" autocomplete="nickname" spellcheck="false" placeholder="Name">
    <ul id="rosterList" class="roster"></ul>
    <p id="lobbyStatus" class="hint"></p>
    <button id="btnReady" type="button">Ready</button>
    <button id="btnLobbyLeave" class="secondary" type="button">Leave</button>
  </div>

  <div id="game" hidden>
    <div id="boards" class="boards"></div>
    <p class="hint" id="ctrlHint"></p>
    <button id="btnAgain" class="secondary" type="button" hidden>Play again</button>
    <button id="btnMenu" class="secondary" type="button">Menu</button>

    <div id="pads" class="pads">
      <div class="pad" data-who="0">
        <span class="pad-tag" id="padTag0">You</span>
        <div class="pad-grid">
          <button type="button" data-act="left">◀</button>
          <button type="button" data-act="rot">↻</button>
          <button type="button" data-act="right">▶</button>
          <button type="button" data-act="soft">▼</button>
          <button type="button" data-act="hard">⬇</button>
        </div>
      </div>
      <div class="pad" data-who="1" id="pad2" hidden>
        <span class="pad-tag">P2</span>
        <div class="pad-grid">
          <button type="button" data-act="left">◀</button>
          <button type="button" data-act="rot">↻</button>
          <button type="button" data-act="right">▶</button>
          <button type="button" data-act="soft">▼</button>
          <button type="button" data-act="hard">⬇</button>
        </div>
      </div>
    </div>
  </div>

  <div id="banner" hidden></div>
  <script src="./peerjs.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
