<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STONEFALL</title>
<link rel="stylesheet" href="./styles.css">
</head>
<body>
  <h1 class="title">STONEFALL</h1>
  <p class="subtitle">Tetris battle</p>

  <div id="menu" class="panel">
    <button id="btnLocal">Same device (1v1)</button>
    <button id="btnHost" class="secondary">Remote — Host</button>
    <button id="btnJoin" class="secondary">Remote — Join</button>
    <p class="hint">Same device always works. Remote: share a 5-character code (needs PeerJS cloud).</p>
  </div>

  <div id="netPanel" class="panel" hidden>
    <p id="netLabel" class="hint"></p>
    <div id="roomCode" class="room-code" hidden>·····</div>
    <button id="btnCopy" type="button" hidden>Copy code</button>
    <input id="netIn" type="text" maxlength="5" autocomplete="off" spellcheck="false" placeholder="Code" hidden>
    <button id="btnNetGo" type="button" hidden>Join</button>
    <p id="netStatus" class="hint"></p>
    <button id="btnNetBack" class="secondary" type="button">Back</button>
  </div>

  <div id="game" hidden>
    <div class="boards">
      <div class="player" id="p1Box">
        <h2 id="p1Title">P1</h2>
        <div class="row">
          <canvas id="c1" width="200" height="400"></canvas>
          <div class="side">
            <div class="mini-label">Next</div>
            <canvas id="n1" width="56" height="56"></canvas>
            <div class="score" id="s1">0</div>
            <div class="meta">LV <span id="l1">1</span> · <span id="ln1">0</span> lines</div>
            <div class="over" id="o1"></div>
          </div>
        </div>
      </div>
      <div class="player" id="p2Box">
        <h2 id="p2Title">P2</h2>
        <div class="row">
          <canvas id="c2" width="200" height="400"></canvas>
          <div class="side">
            <div class="mini-label">Next</div>
            <canvas id="n2" width="56" height="56"></canvas>
            <div class="score" id="s2">0</div>
            <div class="meta">LV <span id="l2">1</span> · <span id="ln2">0</span> lines</div>
            <div class="over" id="o2"></div>
          </div>
        </div>
      </div>
    </div>

    <p class="hint" id="ctrlHint"></p>
    <button id="btnAgain" class="secondary" type="button" hidden>Play again</button>
    <button id="btnMenu" class="secondary" type="button">Menu</button>

    <div id="pads" class="pads">
      <div class="pad" data-who="0">
        <span class="pad-tag">P1</span>
        <div class="pad-grid">
          <button type="button" data-act="left">◀</button>
          <button type="button" data-act="rot">↻</button>
          <button type="button" data-act="right">▶</button>
          <button type="button" data-act="soft">▼</button>
          <button type="button" data-act="hard">⬇</button>
        </div>
      </div>
      <div class="pad" data-who="1" id="pad2">
        <span class="pad-tag">P2</span>
        <div class="pad-grid">
          <button type="button" data-act="left">◀</button>
          <button type="button" data-act="rot">↻</button>
          <button type="button" data-act="right">▶</button>
          <button type="button" data-act="soft">▼</button>
          <button type="button" data-act="hard">⬇</button>
        </div>
      </div>
    </div>
  </div>

  <div id="banner" hidden></div>
  <script src="./peerjs.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
